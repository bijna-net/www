<!DOCTYPE html>
<html>
<head>
<title>Co-op Snek</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:monospace;
}

canvas{
  background:#000;
  border:4px solid white;
  margin-top:20px;
}

.controls{
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🐍 Co-op Snek 🐍</h1>

<p>
Player1: WASD | Player2: Arrow Keys
</p>

<div class="controls">
Speed:
<input type="range" id="speedSlider" min="40" max="300" value="120">
<span id="speedLabel">120 ms</span>
</div>

<canvas id="game" width="600" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const size = 20;
const width = canvas.width;
const height = canvas.height;

let snake1, snake2, dir1, dir2, food, score, gameOver;
let foodEmoji;

let speed = 120;
let loopTimer;

const foods = ["🍎","🍔","🍕","🍩","🌮","🍪","🧀"];

function spawnFood(){
  foodEmoji = foods[Math.floor(Math.random()*foods.length)];
  return {
    x: Math.floor(Math.random()*(width/size))*size,
    y: Math.floor(Math.random()*(height/size))*size
  }
}

function resetGame(){

  snake1=[{x:100,y:200}];
  snake2=[{x:500,y:200}];

  dir1={x:size,y:0};
  dir2={x:-size,y:0};

  food=spawnFood();
  score=0;
  gameOver=false;
}

resetGame();

document.addEventListener("keydown", e => {

  if(e.key==="w") dir1={x:0,y:-size};
  if(e.key==="s") dir1={x:0,y:size};
  if(e.key==="a") dir1={x:-size,y:0};
  if(e.key==="d") dir1={x:size,y:0};

  if(e.key==="ArrowUp") dir2={x:0,y:-size};
  if(e.key==="ArrowDown") dir2={x:0,y:size};
  if(e.key==="ArrowLeft") dir2={x:-size,y:0};
  if(e.key==="ArrowRight") dir2={x:size,y:0};

  if(gameOver && e.key==="r") resetGame();

});

function moveSnake(snake,dir){

  const head={
    x:snake[0].x+dir.x,
    y:snake[0].y+dir.y
  }

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    score++;
    food=spawnFood();
  }else{
    snake.pop();
  }
}

function drawSnake(snake,color){

  ctx.fillStyle=color;

  snake.forEach((s,i)=>{
    ctx.fillRect(s.x,s.y,size,size);

    if(i===0){
      // goofy eyes
      ctx.fillStyle="white";
      ctx.beginPath();
      ctx.arc(s.x+6,s.y+8,3,0,Math.PI*2);
      ctx.arc(s.x+14,s.y+8,3,0,Math.PI*2);
      ctx.fill();

      ctx.fillStyle="black";
      ctx.beginPath();
      ctx.arc(s.x+6,s.y+8,1.5,0,Math.PI*2);
      ctx.arc(s.x+14,s.y+8,1.5,0,Math.PI*2);
      ctx.fill();

      ctx.fillStyle=color;
    }
  });

}

function hitSelf(head,snake){
  for(let i=1;i<snake.length;i++){
    if(head.x===snake[i].x && head.y===snake[i].y)
      return true;
  }
  return false;
}

function hitOther(head,other){
  for(let s of other){
    if(head.x===s.x && head.y===s.y)
      return true;
  }
  return false;
}

function wall(hit){
  return hit.x<0 || hit.y<0 || hit.x>=width || hit.y>=height;
}

function update(){

  if(gameOver) return;

  moveSnake(snake1,dir1);
  moveSnake(snake2,dir2);

  const h1=snake1[0];
  const h2=snake2[0];

  if(
    wall(h1) ||
    wall(h2) ||
    hitSelf(h1,snake1) ||
    hitSelf(h2,snake2) ||
    hitOther(h1,snake2) ||
    hitOther(h2,snake1)
  ){
    gameOver=true;
  }

}

function draw(){

  ctx.fillStyle="black";
  ctx.fillRect(0,0,width,height);

  ctx.font="20px serif";
  ctx.fillText(foodEmoji,food.x+2,food.y+18);

  drawSnake(snake1,"lime");
  drawSnake(snake2,"cyan");

  ctx.fillStyle="white";
  ctx.font="16px monospace";
  ctx.fillText("Score: "+score,10,20);

  if(gameOver){
    ctx.font="28px monospace";
    ctx.fillText("the snakes made a bad life choice",110,200);
    ctx.font="16px monospace";
    ctx.fillText("press R to try again",220,230);
  }

}

function gameLoop(){
  update();
  draw();
}

function startLoop(){
  clearInterval(loopTimer);
  loopTimer = setInterval(gameLoop, speed);
}

startLoop();

const slider = document.getElementById("speedSlider");
const label = document.getElementById("speedLabel");

slider.addEventListener("input", () => {
  speed = slider.value;
  label.textContent = speed + " ms";
  startLoop();
});

</script>

</body>
</html>
