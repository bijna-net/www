<!doctype html>
<html>
  <head>
    <title>🐍 Snek 🐍</title>
    <link rel="stylesheet" href="snek.css" />
  </head>

  <body>
    <h1>🐍 Snek 🐍</h1>

    <div class="controls">
      Players:
      <select id="playerCount">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>

      Speed:
      <input type="range" id="speedSlider" min="40" max="300" value="120" />
      <span id="speedLabel">120 ms</span>

      <button onclick="resetGame()">Start / Restart</button>
    </div>

    <table>
      <tr id="player">
        <td class="p1">P1: WASD</td>
	<td class="p2">P2: Arrows</td>
	<td class="p3">P3: IJKL</td>
	<td class="p4">P4: TFGH</td>
      </tr>
      <tr id="gameover">
        <td class="p1">lif</td>
	<td class="p2">lif</td>
	<td class="p3">lif</td>
	<td class="p4">lif</td>
      </tr>
      <tr id="score">
        <td class="p1">0</td>
	<td class="p2">0</td>
	<td class="p3">0</td>
	<td class="p4">0</td>
      </tr>
    </table>

    <canvas id="game" width="620" height="620"></canvas>
    <script src="snek.js"></script>
  </body>
</html>
